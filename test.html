<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Run Tests — TestPilot</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="page-test">

  <div class="app-shell">
    <!-- Top bar -->
    <header class="topbar">
      <a href="main.html" class="back-btn">← Dashboard</a>
      <span class="topbar__title">Run Tests</span>
      <span class="topbar__badge" id="progressBadge">0 / 0</span>
    </header>

    <!-- No tests guard -->
    <div class="empty-page" id="noTestsGuard" style="display:none">
      <span class="empty-page__icon">🧪</span>
      <h2>No test cases</h2>
      <p>Add some test cases from the Dashboard first.</p>
      <a href="main.html" class="btn btn--primary">Go to Dashboard</a>
    </div>

    <!-- Progress bar -->
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <!-- Current test card -->
    <div class="runner-wrap" id="runnerWrap">
      <div class="runner-meta" id="runnerMeta">
        <span class="runner-session" id="runnerSession">—</span>
        <span class="runner-build"  id="runnerBuild">—</span>
      </div>

      <div class="card card--elevated runner-card" id="runnerCard">
        <div class="runner-index" id="runnerIndex">1 of 1</div>
        <h2 class="runner-title" id="runnerTitle">Test case title</h2>
        <div class="runner-notes-wrap">
          <label class="field-label" for="runnerNotes">Notes (optional)</label>
          <textarea class="field-input runner-notes" id="runnerNotes" rows="3" placeholder="Describe what you observed…"></textarea>
        </div>
        <div class="runner-actions">
          <button class="btn btn--pass"  id="btnPass">✓ Pass</button>
          <button class="btn btn--fail"  id="btnFail">✕ Fail</button>
          <button class="btn btn--skip"  id="btnSkip">⊘ Skip</button>
        </div>
      </div>

      <!-- Nav controls -->
      <div class="runner-nav">
        <button class="btn btn--ghost" id="btnPrev">← Prev</button>
        <button class="btn btn--ghost" id="btnNext">Next →</button>
      </div>

      <!-- Mini list -->
      <section class="card mini-list-section">
        <h3 class="mini-list-heading">All cases</h3>
        <ul class="mini-list" id="miniList"></ul>
      </section>

      <div class="cta-row">
        <a href="completed.html" class="btn btn--primary btn--full">Finish &amp; View Results →</a>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tests = App.getTests();
      const session = App.getSession();
      const guard   = document.getElementById('noTestsGuard');
      const wrap    = document.getElementById('runnerWrap');
      const track   = document.getElementById('progressTrack');

      if (!tests.length) {
        guard.style.display = 'flex';
        wrap.style.display  = 'none';
        track.style.display = 'none';
        return;
      }

      let current = parseInt(sessionStorage.getItem('tp_cursor') || '0');
      if (current >= tests.length) current = 0;

      // Session meta
      document.getElementById('runnerSession').textContent = session.name   || 'Unnamed session';
      document.getElementById('runnerBuild').textContent   = session.build  || 'No build set';

      function render() {
        const t = tests[current];
        document.getElementById('runnerIndex').textContent  = `${current + 1} of ${tests.length}`;
        document.getElementById('runnerTitle').textContent  = t.title;
        document.getElementById('runnerNotes').value        = t.notes || '';
        document.getElementById('progressBadge').textContent= `${current + 1} / ${tests.length}`;
        const pct = ((current) / tests.length) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
        // highlight card by status
        const card = document.getElementById('runnerCard');
        card.className = 'card card--elevated runner-card';
        if (t.status !== 'pending') card.classList.add(`runner-card--${t.status}`);
        sessionStorage.setItem('tp_cursor', current);
        renderMini();
      }

      function saveNotes() {
        const notes = document.getElementById('runnerNotes').value.trim();
        App.updateTestNotes(tests[current].id, notes);
      }

      function mark(status) {
        saveNotes();
        App.markTest(tests[current].id, status);
        // update local ref
        tests[current].status = status;
        tests[current].notes  = document.getElementById('runnerNotes').value.trim();
        // auto-advance
        if (current < tests.length - 1) { current++; render(); }
        else render();
      }

      document.getElementById('btnPass').addEventListener('click', () => mark('pass'));
      document.getElementById('btnFail').addEventListener('click', () => mark('fail'));
      document.getElementById('btnSkip').addEventListener('click', () => mark('skip'));

      document.getElementById('btnPrev').addEventListener('click', () => {
        saveNotes(); if (current > 0) { current--; render(); }
      });
      document.getElementById('btnNext').addEventListener('click', () => {
        saveNotes(); if (current < tests.length - 1) { current++; render(); }
      });

      function renderMini() {
        const ul = document.getElementById('miniList');
        ul.innerHTML = '';
        tests.forEach((t, i) => {
          const li = document.createElement('li');
          li.className = `mini-item mini-item--${t.status} ${i === current ? 'mini-item--active' : ''}`;
          li.innerHTML = `<span class="mini-dot"></span><span class="mini-label">${t.title}</span>`;
          li.addEventListener('click', () => { saveNotes(); current = i; render(); });
          ul.appendChild(li);
        });
      }

      render();
    });
  </script>
</body>
</html>
