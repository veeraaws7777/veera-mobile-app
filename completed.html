<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Results — TestPilot</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="page-completed">

  <div class="app-shell">
    <!-- Top bar -->
    <header class="topbar">
      <a href="test.html" class="back-btn">← Tests</a>
      <span class="topbar__title">Results</span>
      <button class="icon-btn" id="exportBtn" title="Export report">⬇</button>
    </header>

    <!-- Summary card -->
    <div class="card card--elevated summary-card" id="summaryCard">
      <div class="summary-session" id="summarySession">—</div>
      <div class="summary-meta">
        <span id="summaryTester">—</span> · <span id="summaryBuild">—</span>
      </div>
      <div class="summary-donut" id="summaryDonut">
        <svg viewBox="0 0 100 100" class="donut-svg" id="donutSvg">
          <circle class="donut-bg" cx="50" cy="50" r="38" />
          <circle class="donut-pass" id="donutPass" cx="50" cy="50" r="38" stroke-dasharray="0 239" stroke-dashoffset="0" />
          <circle class="donut-fail" id="donutFail" cx="50" cy="50" r="38" stroke-dasharray="0 239" stroke-dashoffset="0" />
          <circle class="donut-skip" id="donutSkip" cx="50" cy="50" r="38" stroke-dasharray="0 239" stroke-dashoffset="0" />
          <text class="donut-pct" id="donutPct" x="50" y="54" text-anchor="middle">—</text>
        </svg>
      </div>
      <div class="summary-legend">
        <span class="legend-item legend-item--pass"><span class="legend-dot"></span> Pass <strong id="legPass">0</strong></span>
        <span class="legend-item legend-item--fail"><span class="legend-dot"></span> Fail <strong id="legFail">0</strong></span>
        <span class="legend-item legend-item--skip"><span class="legend-dot"></span> Skip <strong id="legSkip">0</strong></span>
        <span class="legend-item"><span class="legend-dot legend-dot--pending"></span> Pending <strong id="legPending">0</strong></span>
      </div>
      <div class="verdict" id="verdict">—</div>
    </div>

    <!-- Results list -->
    <section class="card results-section">
      <div class="filter-tabs" id="filterTabs">
        <button class="tab tab--active" data-filter="all">All</button>
        <button class="tab" data-filter="pass">Pass</button>
        <button class="tab" data-filter="fail">Fail</button>
        <button class="tab" data-filter="skip">Skip</button>
        <button class="tab" data-filter="pending">Pending</button>
      </div>
      <ul class="results-list" id="resultsList"></ul>
      <p class="empty-state" id="resultsEmpty" style="display:none">No tests match this filter.</p>
    </section>

    <!-- Actions -->
    <div class="cta-row">
      <a href="test.html" class="btn btn--ghost btn--full">Continue Testing</a>
      <a href="main.html" class="btn btn--primary btn--full">New Session</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tests   = App.getTests();
      const session = App.getSession();
      let   activeFilter = 'all';

      // Session info
      document.getElementById('summarySession').textContent = session.name   || 'Unnamed Session';
      document.getElementById('summaryTester').textContent  = session.tester || 'Unknown tester';
      document.getElementById('summaryBuild').textContent   = session.build  || 'No build';

      const pass    = tests.filter(t => t.status === 'pass').length;
      const fail    = tests.filter(t => t.status === 'fail').length;
      const skip    = tests.filter(t => t.status === 'skip').length;
      const pending = tests.filter(t => t.status === 'pending').length;
      const total   = tests.length;
      const done    = pass + fail + skip;
      const pct     = total ? Math.round((pass / total) * 100) : 0;

      // Legend
      document.getElementById('legPass').textContent    = pass;
      document.getElementById('legFail').textContent    = fail;
      document.getElementById('legSkip').textContent    = skip;
      document.getElementById('legPending').textContent = pending;
      document.getElementById('donutPct').textContent   = total ? pct + '%' : '—';

      // Donut chart (circumference ≈ 238.76)
      const C = 2 * Math.PI * 38;
      function arc(val, offset) {
        const dash = total ? (val / total) * C : 0;
        return { dasharray: `${dash.toFixed(1)} ${(C - dash).toFixed(1)}`, dashoffset: -offset.toFixed(1) };
      }
      const passOff = 0;
      const failOff = (pass / total) * C || 0;
      const skipOff = failOff + ((fail / total) * C || 0);

      const aPass = arc(pass, passOff);
      const aFail = arc(fail, failOff);
      const aSkip = arc(skip, skipOff);

      const dp = document.getElementById('donutPass');
      const df = document.getElementById('donutFail');
      const ds = document.getElementById('donutSkip');

      dp.setAttribute('stroke-dasharray',  aPass.dasharray);
      dp.setAttribute('stroke-dashoffset', aPass.dashoffset);
      df.setAttribute('stroke-dasharray',  aFail.dasharray);
      df.setAttribute('stroke-dashoffset', aFail.dashoffset);
      ds.setAttribute('stroke-dasharray',  aSkip.dasharray);
      ds.setAttribute('stroke-dashoffset', aSkip.dashoffset);

      // Verdict
      const vEl = document.getElementById('verdict');
      if (!total)            { vEl.textContent = 'No tests in suite'; vEl.className = 'verdict'; }
      else if (fail > 0)     { vEl.textContent = '✕ Build Failed';    vEl.className = 'verdict verdict--fail'; }
      else if (pending > 0)  { vEl.textContent = '⏳ Run Incomplete'; vEl.className = 'verdict verdict--pending'; }
      else                   { vEl.textContent = '✓ Build Passed';    vEl.className = 'verdict verdict--pass'; }

      // Render list
      function renderList() {
        const list  = document.getElementById('resultsList');
        const empty = document.getElementById('resultsEmpty');
        const filtered = activeFilter === 'all'
          ? tests
          : tests.filter(t => t.status === activeFilter);
        list.innerHTML = '';
        empty.style.display = filtered.length ? 'none' : 'block';
        filtered.forEach(t => {
          const li = document.createElement('li');
          li.className = `result-item result-item--${t.status}`;
          li.innerHTML = `
            <span class="result-status status--${t.status}">${App.statusLabel(t.status)}</span>
            <div class="result-body">
              <span class="result-title">${t.title}</span>
              ${t.notes ? `<span class="result-notes">${t.notes}</span>` : ''}
            </div>
          `;
          list.appendChild(li);
        });
      }

      // Filter tabs
      document.getElementById('filterTabs').addEventListener('click', e => {
        const btn = e.target.closest('.tab');
        if (!btn) return;
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('tab--active'));
        btn.classList.add('tab--active');
        activeFilter = btn.dataset.filter;
        renderList();
      });

      // Export
      document.getElementById('exportBtn').addEventListener('click', () => {
        const lines = [
          `TestPilot Report`,
          `Session: ${session.name || '—'}`,
          `Tester: ${session.tester || '—'}`,
          `Build: ${session.build || '—'}`,
          `Date: ${new Date().toLocaleString()}`,
          ``,
          `Pass: ${pass}  Fail: ${fail}  Skip: ${skip}  Pending: ${pending}  Total: ${total}`,
          `Pass rate: ${pct}%`,
          ``,
          ...tests.map((t, i) => `${i+1}. [${App.statusLabel(t.status)}] ${t.title}${t.notes ? ' — ' + t.notes : ''}`)
        ];
        const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `testpilot-${(session.name||'report').replace(/\s+/g,'-')}.txt`;
        a.click();
        App.toast('Report downloaded ✓');
      });

      renderList();
    });
  </script>
</body>
</html>
